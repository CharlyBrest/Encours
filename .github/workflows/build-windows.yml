name: Build windows executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build .exe (Windows)
    runs-on: windows-latest
    env:
      ENTRY_POINT: traitement_encours.py
      APP_NAME: encours_windows
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.3'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies & PyInstaller
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path 'requirements.txt') { python -m pip install -r requirements.txt }
          python -m pip install pyinstaller
          python -m pip install tqdm
          python -m pip install pandas

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          # Exemple basique : build en --onefile
          # Pour ajouter une icône : ajouter --icon "path\to\icon.ico"
          # Pour ajouter des fichiers : --add-data "data.txt;dest_folder"
          pyinstaller --noconfirm --onefile --name "$env:APP_NAME" "$env:ENTRY_POINT"

      - name: Smoke test GUI exe (detached, safe)
        shell: pwsh
        run: |
          $exe = Join-Path -Path (Resolve-Path dist).Path -ChildPath ("$env:APP_NAME.exe")
          Write-Host "Exe path: $exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Executable not found"
            exit 1
          }

          # Préférence : lancer avec un flag CI si l'app le supporte (évite les interactions GUI)
          $args = '--ci'

          Write-Host "Starting process with args: $args"
          $proc = Start-Process -FilePath $exe -ArgumentList $args -PassThru -WindowStyle Hidden

          # Attendre un peu pour laisser l'app démarrer
          Start-Sleep -Seconds 8

          # Vérifier que le process existe
          $running = Get-Process -Id $proc.Id -ErrorAction SilentlyContinue
          if (-not $running) {
            Write-Error "Le process ne s'est pas lancé ou est terminé immédiatement (PID: $($proc.Id))"
            exit 1
          }

          Write-Host "Process démarré (PID: $($proc.Id)). Tentative de fermeture propre..."
          try {
            # Tenter de fermer proprement la fenêtre principale
            if ($proc.CloseMainWindow()) {
              Write-Host "CloseMainWindow envoyé, attente d'arrêt (max 10s)..."
              $proc | Wait-Process -Timeout 10
              if (Get-Process -Id $proc.Id -ErrorAction SilentlyContinue) {
                Write-Host "Toujours actif après timeout, arrêt forcé"
                Stop-Process -Id $proc.Id -Force
              } else {
                Write-Host "Arrêt propre effectué"
              }
            } else {
              Write-Host "Impossible d'envoyer CloseMainWindow (pas de fenêtre ou non supporté), arrêt forcé"
              Stop-Process -Id $proc.Id -Force
            }
          } catch {
            Write-Warning "Erreur lors de la fermeture: $_. Arrêt forcé en cours."
            Stop-Process -Id $proc.Id -Force
          }

          Write-Host "Smoke test GUI terminé avec succès"

      - name: Package artifact (zip)
        shell: pwsh
        run: |
          $zipName = "$env:APP_NAME-windows.zip"
          if (Test-Path "dist\$env:APP_NAME.exe") {
            Compress-Archive -Path "dist\$env:APP_NAME.exe" -DestinationPath $zipName -Force
            Write-Host "Created $zipName"
          } else {
            Write-Error "dist\$env:APP_NAME.exe introuvable, échec du packaging"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows
          path: ${{ env.APP_NAME }}-windows.zip